# Configure the in-memory H2 database for tests
spring:
  main:
    register-shutdown-hook: false
  datasource:
    generate-unique-name: true
    name: db4all-test
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    # Automatically create and drop the database schema for each test run
    hibernate:
      ddl-auto: create-drop
    # Use the H2 dialect for JPA
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
